- defaults:
   link:
     relink: true

- clean: ['~']

- clean:
   ~/.config:
      recursive: true
   ~/.local/share:
      recursive: true

- link:
   ~/.zshrc: zshrc
   ~/.gitconfig: gitconfig
   ~/.config/hypr: hypr
   ~/.config/ghostty: ghostty
   ~/.config/waybar: waybar
   ~/.config/fastfetch: fastfetch
   ~/.config/nvim: nvim
   ~/.config/electron-flags.conf: electron-flags.conf
   ~/.config/swaync: swaync
   ~/.local/share/fastfetch: extra/fastfetch
   ~/.local/share/hypr: extra/hypr

- create:
   - ~/downloads
   - ~/.local/share/fastfetch
   - ~/.local/share/hypr

- shell:
   - [git submodule update --init --recursive, Installing submodules]

